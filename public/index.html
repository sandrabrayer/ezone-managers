<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2D0A14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="מנהלים" />
  <title>איזון — מנהלים</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Frank+Ruhl+Libre:wght@500;700;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="top-bar">
    <div class="brand">
      <span class="brand-mark">איזון</span>
      <span class="brand-sub">מנהלים</span>
    </div>
    <div class="month-tag" id="monthTag">—</div>
  </header>

  <nav class="tabs" id="tabs" role="tablist" aria-label="ניווט">
    <button class="tab is-active" data-tab="overview" role="tab" aria-selected="true">דשבורד</button>
    <button class="tab" data-tab="raanana" role="tab">רעננה אשר</button>
    <button class="tab" data-tab="ramot" role="tab">רמות השבים</button>
    <button class="tab" data-tab="efroni" role="tab">קיסריה עפרוני</button>
    <button class="tab" data-tab="rehab" role="tab">קיסריה ריהאב</button>
  </nav>

  <main class="screen" id="screen">

    <!-- TAB 1: OVERVIEW -->
    <section class="panel is-active" id="panel-overview" role="tabpanel">
      <div class="kpis" id="networkKpis">
        <div class="kpi kpi-green">
          <div class="kpi-label">בתים מעל זכאות לבונוס</div>
          <div class="kpi-value is-skeleton" id="kpiHousesAbove">&nbsp;</div>
        </div>
        <div class="kpi kpi-pink">
          <div class="kpi-label">מטופלים פעילים</div>
          <div class="kpi-value is-skeleton" id="kpiActive">&nbsp;</div>
        </div>
        <div class="kpi kpi-gold">
          <div class="kpi-label">סך בונוסים החודש</div>
          <div class="kpi-value gold is-skeleton" id="kpiBonus">&nbsp;</div>
        </div>
        <div class="kpi kpi-orange">
          <div class="kpi-label">ימים שנותרו לחודש</div>
          <div class="kpi-value is-skeleton" id="kpiDaysLeft">&nbsp;</div>
        </div>
      </div>

      <div class="spark-card">
        <div class="spark-card-head">
          <div>
            <div class="spark-title">תפוסה לעומת זכאות לבונוס</div>
            <div class="spark-sub">קו זוהר = זכאות לבונוס · מילוי = מטופלים נוכחיים · רקע = קיבולת</div>
          </div>
        </div>
        <div class="network-spark" id="networkSpark"></div>
      </div>

      <h2 class="section-title">בתים</h2>
      <div class="house-grid" id="houseGrid">
        <div class="house-card is-skeleton-card"></div>
        <div class="house-card is-skeleton-card"></div>
        <div class="house-card is-skeleton-card"></div>
        <div class="house-card is-skeleton-card"></div>
      </div>
    </section>

    <!-- TABS 2-5: HOUSE DETAIL (shared template, populated by JS) -->
    <section class="panel" id="panel-raanana" role="tabpanel" data-house-key="raanana"></section>
    <section class="panel" id="panel-ramot" role="tabpanel" data-house-key="ramot"></section>
    <section class="panel" id="panel-efroni" role="tabpanel" data-house-key="efroni"></section>
    <section class="panel" id="panel-rehab" role="tabpanel" data-house-key="rehab"></section>

  </main>

  <footer class="foot">
    <span id="footStatus">נטען…</span>
  </footer>

  <!-- House detail template -->
  <template id="houseDetailTpl">
    <div class="house-detail">
      <div class="status-banner" data-status-banner></div>

      <div class="next-tier-card" data-next-tier-card>
        <div class="next-tier-header" data-next-tier-header>—</div>
        <div class="next-tier-primary" data-next-tier-primary>
          <div class="ntn-value" data-next-tier-daily-gap>—</div>
          <div class="ntn-label" data-next-tier-daily-label>—</div>
        </div>
        <div class="next-tier-cumulative" data-next-tier-cumulative>—</div>
        <div class="next-tier-status" data-next-tier-status>—</div>
        <div class="next-tier-jump" data-next-tier-jump>—</div>
      </div>

      <div class="kpis">
        <div class="kpi"><div class="kpi-label">כניסות החודש</div><div class="kpi-value" data-stat="entries">—</div></div>
        <div class="kpi"><div class="kpi-label">יציאות החודש</div><div class="kpi-value" data-stat="exits">—</div></div>
        <div class="kpi"><div class="kpi-label">ימי טיפול</div><div class="kpi-value" data-stat="treatmentDays">—</div></div>
        <div class="kpi"><div class="kpi-label">בונוס נוכחי</div><div class="kpi-value gold" data-stat="bonus">—</div></div>
      </div>

      <div class="card chart-card">
        <div class="card-title">ימי טיפול החודש (מתחיל מחדש כל חודש)</div>
        <div class="bep-bar" data-bep-bar>
          <div class="bep-fill" data-bep-fill></div>
          <div class="bep-marker" data-bep-marker><span>★</span><em data-bep-marker-label></em></div>
        </div>
        <div class="bep-legend">
          <span>נצברו החודש: <b data-stat="daysSoFar">—</b></span>
          <span>יעד (זכאות לבונוס): <b data-stat="daysTarget">—</b></span>
          <span>תחזית לסוף חודש: <b data-stat="daysProjection">—</b></span>
        </div>

        <div class="card-subtitle">תפוסה יומית — מספר מטופלים בכל יום בחודש</div>
        <div class="daily-spark-wrap">
          <div class="daily-spark-y-label">מטופלים</div>
          <div data-daily-spark></div>
        </div>
        <ul class="daily-spark-legend">
          <li><span class="dsl-mark dsl-line"></span><span data-daily-spark-legend-line>הקו הכתום = זכאות לבונוס</span></li>
          <li><span class="dsl-mark dsl-bar"></span><span>העמודות = מספר מטופלים בפועל בכל יום</span></li>
        </ul>
      </div>

      <div class="card tier-card">
        <div class="card-title">מדרגות בונוס חודשי</div>
        <div class="tier-track" data-tier-track>
          <div class="tier-fill" data-tier-fill></div>
          <div class="tier-stop" data-tier-stop="1"><span class="ts-label">מדרגה 1</span><span class="ts-amount" data-ts-amount="1">—</span><span class="ts-nights" data-ts-nights="1">—</span></div>
          <div class="tier-stop" data-tier-stop="2"><span class="ts-label">מדרגה 2</span><span class="ts-amount" data-ts-amount="2">—</span><span class="ts-nights" data-ts-nights="2">—</span></div>
          <div class="tier-stop" data-tier-stop="3"><span class="ts-label">מדרגה 3</span><span class="ts-amount" data-ts-amount="3">—</span><span class="ts-nights" data-ts-nights="3">—</span></div>
        </div>
        <div class="tier-current" data-tier-current>—</div>

        <div class="card-subtitle">בונוס יציבות רבעוני</div>
        <div class="quarterly-track">
          <div class="quarterly-fill" data-quarterly-fill></div>
          <div class="quarterly-target" data-quarterly-target>—</div>
        </div>
        <div class="quarterly-note" data-quarterly-note>—</div>
      </div>

      <div class="card breakdown-card">
        <div class="card-title">פירוט חישוב הבונוס</div>
        <ul class="breakdown" data-breakdown></ul>
        <div class="breakdown-total">
          <span>סה״כ</span>
          <strong class="gold" data-stat="bonusTotal">—</strong>
        </div>
      </div>

      <div class="logs">
        <div class="card log-card">
          <div class="card-title">כניסות החודש</div>
          <ul class="log-list" data-log="entries"></ul>
        </div>
        <div class="card log-card">
          <div class="card-title">יציאות החודש</div>
          <ul class="log-list" data-log="exits"></ul>
        </div>
      </div>
    </div>
  </template>

  <script src="/lib/bonus-eligibility.js"></script>
  <script src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
